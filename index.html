<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <title>Shop & Chop — Plan, Shop & Cook</title>
    <meta name="description" content="Premium culinary platform — discover recipes, shop ingredients, and cook with confidence." />
    <meta name="author" content="Shop & Chop" />

    <!-- PWA & Mobile -->
    <meta name="theme-color" content="#C2491D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Shop & Chop" />
    <link rel="apple-touch-icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:title" content="Shop & Chop — Plan, Shop & Cook" />
    <meta property="og:description" content="Premium culinary platform — discover recipes, shop ingredients, and cook with confidence." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/favicon.svg" />

    <!-- Prevent FOUC for dark mode -->
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
